const SURFACES = {
  grass: { label: "🌿 Трава", serveBoost: 1.04, returnDampen: 0.97 },
  hard:  { label: "🎾 Хард", serveBoost: 1.00, returnDampen: 1.00 },
  clay:  { label: "🟧 Грунт", serveBoost: 0.96, returnDampen: 1.04 },

// ─── PROBABILITY ENGINE ──────────────────────────────────────────────────────
function pointWinProb(server, returner, surf) {
  const fsWin = Math.min(0.97, server.fsWin * surf.serveBoost);
  const ssWin = server.ssWin;
  const p1 = server.fsIn * fsWin + (1 - server.fsIn) * ssWin;
  const rfWin = returner.rfWin * surf.returnDampen;
  const rsWin = returner.rsWin * surf.returnDampen;
  const p2 = 1 - (server.fsIn * rfWin + (1 - server.fsIn) * rsWin);
  return Math.min(0.92, Math.max(0.50, (p1 + p2) / 2));
}
function gameWinProb(p) {
  const q = 1 - p;
  const v = (p ** 4) * (1 + 4*q + 10*q*q + 20*q*q*q/(1 - 2*p*q));
  return Math.min(0.999, Math.max(0.001, v));
}
function makeRng(seed) {
  let s = seed >>> 0;
  return () => { s = (Math.imul(1664525, s) + 1013904223) >>> 0; return s / 4294967296; };
}
function simGameFrom(p, rand, a, b) {
  let sp = a, rp = b;
  while (true) {
    if (rand() < p) sp++; else rp++;
    if (sp >= 4 && sp - rp >= 2) return true;
    if (rp >= 4 && rp - sp >= 2) return false;
  }
}
function simTiebreak(pA, pB, rand, target, sa, sb) {
  let a = sa, b = sb, n = a + b;
  while (true) {
    const aServes = (n === 0) || (Math.floor((n + 1) / 2) % 2 === 0);
    if (aServes) { if (rand() < pA) a++; else b++; }
    else { if (rand() < pB) b++; else a++; }
    n++;
    if (a >= target && a - b >= 2) return true;
    if (b >= target && b - a >= 2) return false;
  }
}
function simSet(pA_s, pB_s, rand, gA0, gB0, serverA, ptA0, ptB0, finalSetTBtarget, tbState) {
  if (tbState) {
    const tgt = finalSetTBtarget || 7;
    const aWon = simTiebreak(pA_s, pB_s, rand, tgt, tbState.ptA, tbState.ptB);
    return aWon ? { w: "A", gA: 7, gB: 6 } : { w: "B", gA: 6, gB: 7 };
  }
  let gA = gA0, gB = gB0, aServing = serverA, first = true;
  while (true) {
    const sp = aServing ? pA_s : pB_s;
    let held;
    if (first && (ptA0 > 0 || ptB0 > 0)) held = simGameFrom(sp, rand, ptA0, ptB0);
    else held = simGameFrom(sp, rand, 0, 0);
    first = false;
    if ((aServing && held) || (!aServing && !held)) gA++; else gB++;
    aServing = !aServing;
    if (gA >= 6 && gA - gB >= 2) return { w: "A", gA, gB };
    if (gB >= 6 && gB - gA >= 2) return { w: "B", gA, gB };
    if (gA === 6 && gB === 6) {
      const tgt = finalSetTBtarget || 7;
      const aWon = simTiebreak(pA_s, pB_s, rand, tgt, 0, 0);
      return aWon ? { w: "A", gA: 7, gB: 6 } : { w: "B", gA: 6, gB: 7 };
    }
  }
}
function adjustedPoint(pBase, momA, momB, side, h2hA, h2hB) {
  const momEdge = ((side === "A" ? momA - momB : momB - momA) / 10) * 0.025;
  const h2hDiff = side === "A" ? h2hA - h2hB : h2hB - h2hA;
  const h2hEdge = Math.max(-2, Math.min(2, h2hDiff)) / 2 * 0.02;
  return Math.min(0.92, Math.max(0.50, pBase + momEdge + h2hEdge));
}
function runSim(cfg, n) {
  const surf = SURFACES[cfg.surface];
  const A = cfg.A, B = cfg.B;
  let pA = pointWinProb(A, B, surf);
  let pB = pointWinProb(B, A, surf);
  pA = adjustedPoint(pA, cfg.momA, cfg.momB, "A", cfg.h2hA, cfg.h2hB);
  pB = adjustedPoint(pB, cfg.momA, cfg.momB, "B", cfg.h2hA, cfg.h2hB);
  const pA_s = gameWinProb(pA);
  const pB_s = gameWinProb(pB);
  const setsToWin = cfg.bestOf === 5 ? 3 : 2;
  const rand = makeRng((Math.random() * 4294967296) >>> 0);
  let winsA = 0, winsB = 0, setWinsA = 0, setWinsB = 0;
  const scoreDist = {}, firstSetDist = {};
  let tgA = 0, tgB = 0;
  for (let i = 0; i < n; i++) {
    let sA = cfg.live ? cfg.setsA : 0;
    let sB = cfg.live ? cfg.setsB : 0;
    let gamesA = 0, gamesB = 0;
    let serverA = cfg.live ? cfg.serverA : true;
    let firstSetScore = null;
    if (cfg.live && (sA + sB < setsToWin * 2)) {
      const tbState = cfg.tiebreak ? { ptA: cfg.ptA, ptB: cfg.ptB } : null;
      const cur = tbState
        ? simSet(pA_s, pB_s, rand, 6, 6, serverA, 0, 0, 7, tbState)
        : simSet(pA_s, pB_s, rand, cfg.gA, cfg.gB, serverA, cfg.ptA, cfg.ptB);
      gamesA += (cur.gA - (tbState ? 6 : cfg.gA));
      gamesB += (cur.gB - (tbState ? 6 : cfg.gB));
      if (cur.w === "A") sA++; else sB++;
      serverA = !serverA;
      if (!firstSetScore) firstSetScore = cur;
    }
    while (sA < setsToWin && sB < setsToWin) {
      const set = simSet(pA_s, pB_s, rand, 0, 0, serverA, 0, 0);
      if (set.w === "A") sA++; else sB++;
      gamesA += set.gA; gamesB += set.gB;
      serverA = !serverA;
      if (!firstSetScore) firstSetScore = set;
    }
    if (sA > sB) winsA++; else winsB++;
    const key = sA + "-" + sB;
    scoreDist[key] = (scoreDist[key] || 0) + 1;
    if (firstSetScore) {
      const fk = firstSetScore.gA + "-" + firstSetScore.gB;
      firstSetDist[fk] = (firstSetDist[fk] || 0) + 1;
      if (firstSetScore.w === "A") setWinsA++; else setWinsB++;
    }
    tgA += gamesA; tgB += gamesB;
  }
  const avgGA = tgA / n, avgGB = tgB / n;
  const matchLen = avgGA + avgGB;
  const lenFactor = cfg.live ? 1 : matchLen / 22;
  const aceA = (A.ace || 0) * lenFactor, aceB = (B.ace || 0) * lenFactor;
  const dfA = (A.df || 0) * lenFactor, dfB = (B.df || 0) * lenFactor;
  let curGame = null;
  if (cfg.live && !cfg.tiebreak) {
    const sp = cfg.serverA ? pA_s : pB_s;
    curGame = { server: cfg.serverA ? "A" : "B", holdPct: (sp * 100).toFixed(1) };
  }
  return {
    n, winsA, winsB,
    pctA: ((winsA/n)*100).toFixed(1), pctB: ((winsB/n)*100).toFixed(1),
    pPointA: (pA*100).toFixed(1), pPointB: (pB*100).toFixed(1),
    pHoldA: (pA_s*100).toFixed(1), pHoldB: (pB_s*100).toFixed(1),
    scoreDist, firstSetDist,
    avgGamesA: avgGA.toFixed(1), avgGamesB: avgGB.toFixed(1),
    aceA: aceA.toFixed(1), aceB: aceB.toFixed(1),
    dfA: dfA.toFixed(1), dfB: dfB.toFixed(1),
    totalAces: (aceA+aceB).toFixed(1), totalDfs: (dfA+dfB).toFixed(1),
    curGame,
    setPctA: ((setWinsA/n)*100).toFixed(1), setPctB: ((setWinsB/n)*100).toFixed(1),
  };
}

function deriveExtras(p) {
  let ace = +(2 + (p.fsWin - 0.68) * 45 + (p.fsIn > 0.66 ? -1.5 : 1)).toFixed(1);
  let df = +(2 + (0.51 - p.ssWin) * 18).toFixed(1);
  return { ace: Math.max(2, Math.min(15, ace)), df: Math.max(1.5, Math.min(5, df)), ue: 30 };
}
Object.keys(PRESETS).forEach(k => {
  if (PRESETS[k].ace == null) { const ex = deriveExtras(PRESETS[k]); PRESETS[k] = Object.assign({}, PRESETS[k], ex); }
});

// ─── HEAD-TO-HEAD DATABASE ────────────────────────────────────────────────────
function h2hKey(nameA, nameB) {
  const a = nameA.split(" ")[0].toLowerCase(), b = nameB.split(" ")[0].toLowerCase();
  return [a, b].sort().join("|");
}
const H2H_DB = {
  "marozsan|molcan": {molcan:1,marozsan:0},
  "moutet|shelbayh": {shelbayh:0,moutet:0},
  "fucsovics|moutet": {fucsovics:2,moutet:2},
  "kecmanovic|medjedovic": {kecmanovic:0,medjedovic:0},
  "landaluce|struff": {landaluce:0,struff:0},
  "alcaraz|marozsan": {marozsan:1,alcaraz:1},
  "musetti|marozsan": {musetti:1,marozsan:0},
  "sinner|alcaraz": {sinner:6,alcaraz:6},
  "altmaier|paul": {paul:2,altmaier:1},
  "altmaier|tiafoe": {tiafoe:4,altmaier:0},
  "kopriva|quinn": {quinn:3,kopriva:0},
  "kecmanovic|sonego": {sonego:6,kecmanovic:3},
  "marozsan|tabilo": {marozsan:0,tabilo:0},
  "darderi|hanfmann": {darderi:1,hanfmann:1},
  "davidovich|dimitrov": {davidovich:2,dimitrov:0},
};
function lookupH2H(nameA, nameB) {
  const rec = H2H_DB[h2hKey(nameA, nameB)];
  if (!rec) return [0, 0];
  const a = nameA.split(" ")[0].toLowerCase(), b = nameB.split(" ")[0].toLowerCase();
  return [rec[a] || 0, rec[b] || 0];
}

//  api-tennis.com  LIVE INTEGRATION
//  Get a free key at https://api-tennis.com  →  paste below or in the UI field.
// ════════════════════════════════════════════════════════════════════════════
let API_KEY = localStorage.getItem("apiTennisKey") || "";   // <-- or hardcode here
let PROXY_URL = localStorage.getItem("apiTennisProxy") || ""; // Cloudflare Worker URL (recommended)

// Build a request URL. If a proxy is set, route through it (proxy injects the key
// and adds CORS headers). Otherwise call the API directly (will likely hit CORS).
function apiUrl(method, extraParams) {
  const params = Object.assign({ method }, extraParams || {});
  if (PROXY_URL) {
    const u = new URL(PROXY_URL);
    Object.keys(params).forEach(k => u.searchParams.set(k, params[k]));
    return u.toString(); // proxy adds APIkey itself
  }
  // Direct (no proxy): include key in the query
  const qs = Object.keys(params).map(k => k + "=" + encodeURIComponent(params[k])).join("&");
  return "https://api.api-tennis.com/tennis/?" + qs + "&APIkey=" + encodeURIComponent(API_KEY);
}

// Fetch live tennis matches. Returns array of {key, home, away, score...} normalized.
async function fetchLiveMatches() {
  if (!API_KEY && !PROXY_URL) throw new Error("Нет API-ключа или прокси");
  const url = apiUrl("get_livescore");
  const res = await fetch(url);
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  if (!data || !data.result) return [];
  // Normalize: api-tennis returns event_first_player / event_second_player / event_game_result etc.
  return data.result.map(ev => ({
    id: ev.event_key,
    home: ev.event_first_player,
    away: ev.event_second_player,
    firstServe: ev.event_serve,            // "First Player" / "Second Player" or null
    finalResult: ev.event_final_result,    // e.g. "1 - 0"
    gameScore: ev.event_game_result,       // e.g. "30 - 40"
    setScores: ev.scores || [],            // array of per-set {score_first, score_second}
    status: ev.event_status,               // e.g. "Set 2"
    tournament: ev.tournament_name,
    pointbypoint: ev.pointbypoint || [],   // detailed feed (premium tiers only)
  }));
}

// ── MATCH-STATS FETCHER (dormant on free tier; activates when API returns p-b-p) ──
// On paid (Ultra/Mega) plans, get_fixtures returns a "pointbypoint" array per match.
// We fetch it by event_key and derive ROUGH in-match form. IMPORTANT: api-tennis
// records who WON each point, not HOW it was served — so exact first/second-serve
// percentages are NOT extractable. We compute hold% and break-point save% only.
async function fetchMatchStats(eventKey) {
  if ((!API_KEY && !PROXY_URL) || !eventKey) return null;
  // Try fixtures for today filtered to this event (p-b-p lives here on paid tiers)
  const today = new Date().toISOString().slice(0, 10);
  const url = apiUrl("get_fixtures", { date_start: today, date_stop: today, match_key: eventKey });
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    if (!data || !data.result || !data.result.length) return null;
    const ev = Array.isArray(data.result) ? data.result.find(e => String(e.event_key) === String(eventKey)) || data.result[0] : null;
    if (!ev || !ev.pointbypoint || !ev.pointbypoint.length) return null;
    return parsePointByPoint(ev.pointbypoint);
  } catch (e) {
    return null;
  }
}

// Derive rough in-match serve form from point-by-point.
// Returns { A:{holdPct, bpSavePct, svcGames, bpFaced, bpSaved}, B:{...} } or null.
function parsePointByPoint(pbp) {
  const stat = {
    First:  { svcGames: 0, svcHeld: 0, bpFaced: 0, bpSaved: 0 },
    Second: { svcGames: 0, svcHeld: 0, bpFaced: 0, bpSaved: 0 },
  };
  pbp.forEach(game => {
    const server = game.player_served;           // "First Player" / "Second Player"
    const key = server && /first/i.test(server) ? "First" : "Second";
    if (!server) return;
    stat[key].svcGames++;
    // Held if the server also won the game
    const winner = game.serve_winner;
    if (winner && server && winner === server) stat[key].svcHeld++;
    // Break points faced/saved from the points array
    if (Array.isArray(game.points)) {
      game.points.forEach(pt => {
        if (pt.break_point) {
          stat[key].bpFaced++;
          // If the very next state isn't a lost game, count as saved (rough heuristic):
          // simpler — if server eventually held, treat faced BPs as saved.
        }
      });
      if (winner === server) stat[key].bpSaved += 0; // refined below
    }
  });
  // Rough BP-save: if server held the game, all BPs in it were saved.
  // Re-scan with that rule.
  const re = { First:{bpFaced:0,bpSaved:0}, Second:{bpFaced:0,bpSaved:0} };
  pbp.forEach(game => {
    const server = game.player_served;
    if (!server) return;
    const key = /first/i.test(server) ? "First" : "Second";
    const held = game.serve_winner === server;
    let bpInGame = 0;
    if (Array.isArray(game.points)) game.points.forEach(pt => { if (pt.break_point) bpInGame++; });
    re[key].bpFaced += bpInGame;
    if (held) re[key].bpSaved += bpInGame;   // held → saved them all
  });
  const mk = (k) => {
    const s = stat[k], r = re[k];
    if (s.svcGames === 0) return null;
    return {
      holdPct: ((s.svcHeld / s.svcGames) * 100).toFixed(0),
      svcGames: s.svcGames,
      bpFaced: r.bpFaced,
      bpSaved: r.bpSaved,
      bpSavePct: r.bpFaced ? ((r.bpSaved / r.bpFaced) * 100).toFixed(0) : "—",
    };
  };
  const A = mk("First"), B = mk("Second");
  if (!A && !B) return null;
  return { A, B };
}

// Map an api-tennis match onto our live-config fields. Best-effort parsing.
function parseLiveToConfig(m) {
  const cfg = { setsA: 0, setsB: 0, gA: 0, gB: 0, ptA: 0, ptB: 0, tiebreak: false, serverA: true };
  // Sets won = count completed sets where a player reached 6/7
  let setsA = 0, setsB = 0, curA = 0, curB = 0;
  if (Array.isArray(m.setScores) && m.setScores.length) {
    m.setScores.forEach((s, idx) => {
      const a = parseInt(s.score_first), b = parseInt(s.score_second);
      if (isNaN(a) || isNaN(b)) return;
      const done = (a >= 6 || b >= 6) && Math.abs(a - b) >= 2 || a === 7 || b === 7;
      if (idx < m.setScores.length - 1 || done) {
        if (a > b) setsA++; else if (b > a) setsB++;
      } else { curA = a; curB = b; }
    });
    // last set is current if not done
    const last = m.setScores[m.setScores.length - 1];
    const la = parseInt(last.score_first), lb = parseInt(last.score_second);
    const lastDone = ((la >= 6 || lb >= 6) && Math.abs(la - lb) >= 2) || la === 7 || lb === 7;
    if (!lastDone) { curA = la; curB = lb; }
  }
  cfg.setsA = setsA; cfg.setsB = setsB; cfg.gA = curA; cfg.gB = curB;
  // Game points
  if (m.gameScore && m.gameScore.indexOf("-") >= 0) {
    const [ga, gb] = m.gameScore.split("-").map(s => s.trim());
    const ptMap = { "0":0, "15":1, "30":2, "40":3, "AD":4, "A":4 };
    if (curA === 6 && curB === 6) { // tiebreak
      cfg.tiebreak = true;
      cfg.ptA = parseInt(ga) || 0; cfg.ptB = parseInt(gb) || 0;
    } else {
      cfg.ptA = ptMap[ga] != null ? ptMap[ga] : 0;
      cfg.ptB = ptMap[gb] != null ? ptMap[gb] : 0;
    }
  }
  // Server
  if (m.firstServe) cfg.serverA = /first/i.test(m.firstServe);
  return cfg;
}

// Fuzzy-match an api-tennis player name to our preset list (by surname).
function matchPreset(apiName) {
  if (!apiName) return null;
  const surname = apiName.split(" ").pop().toLowerCase();
  const first = apiName.split(/[\s,]/)[0].toLowerCase();
  for (const name of PRESET_NAMES) {
    const presetSurname = name.split(" ")[0].toLowerCase();
    if (presetSurname === surname || presetSurname === first ||
        surname.indexOf(presetSurname) >= 0 || presetSurname.indexOf(surname) >= 0) {
      return name;
    }
  }
  return null;
}

// ── Session persistence: keep settings for 2 hours, then reset to default ──
const SESSION_KEY = "tennisSimSession";
const SESSION_TTL = 2 * 60 * 60 * 1000; // 2 hours in ms
// Only these fields are persisted (not transient result/apiStatus/liveMatches)
const PERSIST_FIELDS = ["nameA","statsA","nameB","statsB","surface","bestOf",
  "live","setsA","setsB","gA","gB","serverA","ptA","ptB","tiebreak","tbA","tbB",
  "momA","momB","h2hA","h2hB","h2hAuto"];

function loadState() {
  const def = defaultState();
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return def;
    const saved = JSON.parse(raw);
    if (!saved || !saved.ts || (Date.now() - saved.ts) > SESSION_TTL) {
      localStorage.removeItem(SESSION_KEY);   // expired → reset
      return def;
    }
    // Within 2 hours → restore persisted fields onto defaults
    PERSIST_FIELDS.forEach(f => { if (saved.data && saved.data[f] !== undefined) def[f] = saved.data[f]; });
    return def;
  } catch (e) {
    return def;
  }
}

function saveState() {
  try {
    const data = {};
    PERSIST_FIELDS.forEach(f => { data[f] = S[f]; });
    localStorage.setItem(SESSION_KEY, JSON.stringify({ ts: Date.now(), data }));
  } catch (e) {}
}

function buildCfg() {

    momA: S.momA, momB: S.momB, h2hA: S.h2hA, h2hB: S.h2hB,

}
function recompute() { saveState(); S.result = runSim(buildCfg(), 10000); render(); }

function setPlayer(side, name) {
  if (side === "A") { S.nameA = name; S.statsA = Object.assign({}, PRESETS[name] || S.statsA); }

  recompute();
}

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === "style") e.setAttribute("style", attrs[k]);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === "html") e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  (children || []).forEach(c => { if (c == null) return; e.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
  return e;
}

async function loadLive() {
  S.apiStatus = "Загрузка…"; render();
  try {
    const matches = await fetchLiveMatches();
    S.liveMatches = matches;
    S.apiStatus = matches.length ? ("Найдено матчей: "+matches.length) : "Сейчас нет live-матчей";
  } catch (e) {
    S.apiStatus = "Ошибка: " + e.message + " (проверь ключ / CORS — возможно нужен прокси)";
  }
  render();
}

function applyLiveMatch(idx) {
  if (idx < 0 || !S.liveMatches[idx]) return;
  const m = S.liveMatches[idx];
  S.activeMatchId = m.id;
  applyMatchData(m, true);
}

// Apply a match object to state. autoMomentum=true also pulls & applies p-b-p form.
function applyMatchData(m, fetchStats) {
  const pA = matchPreset(m.home), pB = matchPreset(m.away);
  if (pA) { S.nameA = pA; S.statsA = Object.assign({}, PRESETS[pA]); }
  else { S.nameA = m.home; }   // keep current stats as fallback
  if (pB) { S.nameB = pB; S.statsB = Object.assign({}, PRESETS[pB]); }
  else { S.nameB = m.away; }
  const lc = parseLiveToConfig(m);
  S.live = true;
  S.setsA = lc.setsA; S.setsB = lc.setsB; S.gA = lc.gA; S.gB = lc.gB;
  S.tiebreak = lc.tiebreak; S.serverA = lc.serverA;
  if (lc.tiebreak) { S.tbA = lc.ptA; S.tbB = lc.ptB; } else { S.ptA = lc.ptA; S.ptB = lc.ptB; }
  if (S.h2hAuto) { const [a,b] = lookupH2H(S.nameA, S.nameB); S.h2hA = a; S.h2hB = b; }
  S.apiStatus = "Подставлено: " + m.home + " vs " + m.away +
    (pA && pB ? " (оба в базе)" : " (часть игроков не в базе — статы по умолчанию, отредактируй вручную)");
  S.matchStats = null; S.matchStatsMsg = "";
  recompute();
  if (fetchStats) {
    S.matchStatsMsg = "Запрос детальной статистики матча…"; render();
    fetchMatchStats(m.id).then(stats => {
      if (stats) { S.matchStats = stats; S.matchStatsMsg = ""; }
      else { S.matchStats = null; S.matchStatsMsg = "Детальная статистика недоступна (нужен платный тариф с point-by-point)."; }
      render();
    }).catch(() => {
      S.matchStats = null; S.matchStatsMsg = "Детальная статистика недоступна.";
      render();
    });
  }
}

// ── AUTO-REFRESH: re-fetch the active match every N seconds (live only) ──
let refreshTimer = null;
function startAutoRefresh() {
  stopAutoRefresh();
  if (!S.autoRefresh || !S.activeMatchId) return;
  refreshTimer = setInterval(refreshActiveMatch, Math.max(5, S.refreshSec) * 1000);
}
function stopAutoRefresh() {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
}
async function refreshActiveMatch() {
  if (!S.activeMatchId) return;
  try {
    const matches = await fetchLiveMatches();
    const m = matches.find(x => String(x.id) === String(S.activeMatchId));
    const t = new Date().toLocaleTimeString("ru-RU");
    if (m) {
      // Re-apply score (keep momentum if user already applied it manually)
      applyMatchData(m, true);
      S.lastRefresh = "обновлено " + t;
    } else {
      S.lastRefresh = "матч не найден (возможно завершён) — " + t;
    }
    render();
  } catch (e) {
    S.lastRefresh = "ошибка обновления — " + new Date().toLocaleTimeString("ru-RU");
    render();
  }
}

// Apply in-match form as a momentum nudge (rough — based on hold% & BP-save%).
function applyMatchStatsToMomentum() {
  const ms = S.matchStats; if (!ms) return;
  // Map hold% (40-100) onto momentum 0-10 around a 75% neutral baseline.
  const toMom = (st) => {
    if (!st) return 5;
    const hold = parseFloat(st.holdPct);
    if (isNaN(hold)) return 5;
    return Math.max(0, Math.min(10, Math.round(5 + (hold - 75) / 5)));
  };
  S.momA = toMom(ms.A);
  S.momB = toMom(ms.B);
  S.matchStatsMsg = "Форма матча применена к моментуму (грубая оценка по удержанию подачи).";
  // Collapse both player editor blocks and mark that names come from a live match.
  S.collapseA = true;
  S.collapseB = true;
  S.fromLive = true;
  recompute();
}

function copyParams() {
  const r = S.result;
  const surfLabel = SURFACES[S.surface].label;
  const liveStr = S.live ? ("LIVE: "+S.setsA+"-"+S.setsB+" сеты, "+S.gA+"-"+S.gB+(S.tiebreak?(" ТБ "+S.tbA+":"+S.tbB):(" "+PTS[S.ptA]+":"+PTS[S.ptB]))+", подаёт "+(S.serverA?S.nameA.split(" ")[0]:S.nameB.split(" ")[0])) : "С нуля";
  const lines = [
    "🎾 "+S.nameA+" vs "+S.nameB,
    surfLabel+" · Best of "+S.bestOf, liveStr,
    "Моментум "+S.momA+"/"+S.momB+" · H2H "+S.h2hA+"-"+S.h2hB, "",
    r?("Победа: "+S.nameA.split(" ")[0]+" "+r.pctA+"% — "+r.pctB+"% "+S.nameB.split(" ")[0]):"",
    r?("Сет xG: "+r.setPctA+"% — "+r.setPctB+"%"):"",
    r?("Среднее геймов: "+r.avgGamesA+" — "+r.avgGamesB):"",
    r?("Эйсы Σ "+r.totalAces+" · Двойные Σ "+r.totalDfs):"",
  ].filter(x=>x!=="").join("\n");
  const done=()=>{S.copied=true;render();setTimeout(()=>{S.copied=false;render();},2000);};
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(lines).then(done,()=>{fallbackCopy(lines);done();});
  else { fallbackCopy(lines); done(); }
}
function fallbackCopy(text){const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);}

function resetDefaults() {
  localStorage.removeItem(SESSION_KEY);
  const def = defaultState();
  // keep the API key (it lives in its own storage and shouldn't be wiped)
  def.apiKey = S.apiKey;
  Object.keys(def).forEach(k => { S[k] = def[k]; });
  if (S.h2hAuto) { const [a,b] = lookupH2H(S.nameA, S.nameB); S.h2hA = a; S.h2hB = b; }
  recompute();
}

function render() {
  const app = document.getElementById("app");
  const vb = document.getElementById("verbadge");
  if (vb) vb.textContent = "v" + APP_VERSION;
  app.innerHTML = "";
  app.appendChild(el("div",{style:"margin-bottom:20px;padding-top:8px"},[
    el("div",{class:"sub"},["Универсальный симулятор · Monte Carlo · 10 000 матчей · v"+APP_VERSION]),
    el("h1",null,["🎾 Tennis Match Simulator"]),
  ]));
  app.appendChild(apiCard());
  app.appendChild(surfaceRow());
  app.appendChild(playerSelect("A"));
  app.appendChild(playerSelect("B"));
  app.appendChild(momH2HCard());
  app.appendChild(liveCard());
  app.appendChild(el("button",{class:"runbtn",onclick:recompute},["🔄 Пересчитать (новая выборка)"]));
  app.appendChild(el("button",{class:"copybtn",style:S.copied?"border-color:#4ade80;background:#14532d;color:#4ade80":"",onclick:copyParams},
    [S.copied?"✅ Скопировано!":"📋 Скопировать параметры и результат"]));
  app.appendChild(el("button",{class:"copybtn",style:"border-color:#7f1d1d;color:#fca5a5;margin-top:-10px",onclick:resetDefaults},
    ["♻️ Сбросить к настройкам по умолчанию"]));
  app.appendChild(resultsBlock());
  app.appendChild(el("div",{style:"font-size:11px;color:#475569;line-height:1.6;padding:0 4px;margin-top:8px"},
    ["⚠️ Статистика игроков — реальные цифры 2026 (часть оценочная). Live через api-tennis.com при наличии ключа; иначе вводи счёт вручную. Не инвестиционная рекомендация."]));
}

recompute();
</script>
